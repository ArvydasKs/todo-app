<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Užduočių tvarkyklė</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>Užduočių tvarkyklė</h1>

    <div id="tasks-section" style="display:none">
        <div class="tasks-box">
            <div class="tasks-header">
                <h2>Mano užduotys</h2>
                <button class="danger" onclick="logout()">Atsijungti</button>
            </div>
            <div class="task-form">
                <input type="text" id="task-title" placeholder="Užduoties pavadinimas">
                <input type="text" id="task-desc" placeholder="Aprašymas (neprivaloma)">
                <input type="datetime-local" id="task-due" placeholder="Terminas (neprivaloma)">
                <select id="task-priority">
                    <option value="low">Žemas</option>
                    <option value="medium" selected>Vidutinis</option>
                    <option value="high">Aukštas</option>
                </select>
                <button class="secondary" onclick="createTask()">Pridėti</button>
            </div>
            <div id="tasks-message"></div>
            <div class="tasks-controls" style="display:flex; justify-content:flex-end; gap:10px; align-items:center; margin:10px 0;">
                <label for="tasks-filter" style="font-size:0.9rem; color:#333;">Rūšiuoti pagal:</label>
                <select id="tasks-filter">
                    <option value="created" selected>Sukūrimo datą</option>
                    <option value="due">Terminą</option>
                    <option value="priority">Prioritetą</option>
                </select>
            </div>
            <div id="tasks-list"></div>
        </div>
    </div>
</div>
<script src="/static/js/utils.js"></script>
<script src="/static/js/tasks.js"></script>
</body>
</html>
