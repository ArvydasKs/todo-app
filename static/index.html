<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>Todo App</h1>

    <div id="auth-section">
        <div class="auth-box">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login', event)">Prisijungti</div>
                <div class="tab" onclick="showTab('register', event)">Registruotis</div>
            </div>
            <div id="login-form">
                <input type="text" id="login-username" placeholder="Vartotojo vardas">
                <input type="password" id="login-password" placeholder="Slaptažodis">
                <button onclick="login()">Prisijungti</button>
            </div>
            <div id="register-form" style="display:none">
                <input type="text" id="reg-username" placeholder="Vartotojo vardas">
                <input type="email" id="reg-email" placeholder="El. paštas">
                <input type="password" id="reg-password" placeholder="Slaptažodis">
                <button onclick="register()">Registruotis</button>
            </div>
            <div id="auth-message"></div>
        </div>
    </div>

    <div id="tasks-section" style="display:none">
        <div class="tasks-box">
            <div class="tasks-header">
                <h2>Mano užduotys</h2>
                <button class="danger" onclick="logout()">Atsijungti</button>
            </div>
            <div class="task-form">
                <input type="text" id="task-title" placeholder="Užduoties pavadinimas">
                <input type="text" id="task-desc" placeholder="Aprašymas (neprivaloma)">
                <select id="task-priority">
                    <option value="low">Žemas</option>
                    <option value="medium" selected>Vidutinis</option>
                    <option value="high">Aukštas</option>
                </select>
                <button class="secondary" onclick="createTask()">Pridėti</button>
            </div>
            <div id="tasks-message"></div>
            <div id="tasks-list"></div>
        </div>
    </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
