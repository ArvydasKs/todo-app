name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
      - test
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_OWNER: arvydasks

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Lint
        run: |
          flake8 app/ tests/

      - name: Run Tests
        run: |
          PYTHONPATH=$PYTHONPATH:. pytest tests/ -v

  docker-build-push:
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.base_ref == 'test'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ env.REPO_OWNER }}/todo-app:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ env.REPO_OWNER }}/todo-app:latest

  deploy-test:
    runs-on: [self-hosted, todo-test]
    needs: docker-build-push
    if: github.base_ref == 'test'
    environment: test

    steps:
      - name: Deploy
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/arvydasks/todo-app:latest
          docker stop todo-app || true
          docker rm todo-app || true
          docker run -d \
            --name todo-app \
            -p 8000:8000 \
            -e DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_NAME }} \
            ghcr.io/arvydasks/todo-app:latest